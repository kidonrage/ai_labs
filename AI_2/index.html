<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Simple LLM Agent Chat</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="title">
          <div class="h1">Simple Agent Chat</div>
          <div class="h2">HTML • CSS • JS (modules)</div>
        </div>

        <div class="controls">
          <label class="field">
            <span>Base URL</span>
            <input id="baseUrl" type="text" value="https://api.proxyapi.ru" />
          </label>

          <label class="field">
            <span>Model</span>
            <select id="model">
              <option value="gpt-4.1">gpt-4.1</option>
              <option value="gpt-5.2">gpt-5.2</option>
              <option value="gpt-3.5-turbo">gpt-3.5-turbo</option>
            </select>
          </label>

          <label class="field">
            <span>Temperature</span>
            <input
              id="temperature"
              type="number"
              min="0"
              max="2"
              step="0.1"
              value="0.7"
            />
          </label>

          <label class="field">
            <span>Чаты</span>
            <select id="chatSelect"></select>
          </label>

          <label class="field">
            <span>Стратегия активного чата</span>
            <input id="activeChatContextStrategy" type="text" readonly />
          </label>

          <button id="newChat" class="btn secondary" type="button">
            Новый чат
          </button>

          <button id="branchChat" class="btn secondary" type="button">
            Новый из текущего
          </button>

          <button id="renameChat" class="btn secondary" type="button">
            Переименовать
          </button>

          <button id="deleteChat" class="btn danger" type="button">
            Удалить чат
          </button>
        </div>
      </header>

      <main class="chat">
        <details id="factsPanel" class="facts-panel" hidden>
          <summary>Memory Layers (long/working/short)</summary>
          <pre id="factsContent"></pre>
        </details>
        <div id="messages" class="messages" aria-live="polite"></div>
      </main>

      <footer class="composer">
        <div class="totals" id="totals" aria-live="polite">History totals: —</div>
        <textarea id="input" rows="2" placeholder="Напиши сообщение…"></textarea>
        <button id="send" class="btn primary" type="button">Send</button>
      </footer>
    </div>

    <dialog id="newChatDialog" class="modal">
      <form method="dialog" class="modal-form">
        <div class="modal-title">Создать новый чат</div>
        <label class="field">
          <span>Стратегия контекста</span>
          <select id="newChatDialogStrategy">
            <option value="sliding_window">Sliding Window</option>
            <option value="sticky_facts">Sticky Facts / Key-Value Memory</option>
          </select>
        </label>
        <div class="modal-actions">
          <button type="button" id="cancelNewChatDialog" class="btn secondary">
            Отмена
          </button>
          <button type="submit" value="create" class="btn primary">
            Создать
          </button>
        </div>
      </form>
    </dialog>

    <script type="module" src="app.js"></script>
  </body>
</html>
